name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package

      # Only run the steps below when pushing a version tag
      - name: Get version from pom.xml
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $env:GITHUB_OUTPUT

      - name: Create installer with jpackage
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          jpackage `
            --input target/ `
            --main-jar aws-idp-saml-swing-all.jar `
            --main-class com.your.package.MainClass `
            --name "AWS IDP SAML" `
            --app-version ${{ steps.version.outputs.version }} `
            --type exe `
            --win-shortcut `
            --win-menu `
            --dest installer-output

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: installer-output/*.exe
          generate_release_notes: true